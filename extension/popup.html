<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Resume Scorer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="icons/icon48.png" alt="" width="24" height="24" />
      <span>Resume Scorer</span>
    </div>
    <div class="actions">
      <button id="openDashboardBtn" class="link-btn" title="Open the full dashboard in a new tab">Dashboard ↗</button>
      <button id="manageConnectionsBtn" class="link-btn hidden" title="Add or remove inboxes">Connections</button>
      <button id="signOutBtn" class="link-btn hidden" title="Sign out of all inboxes">Sign out</button>
    </div>
  </header>

  <section id="authPanel" class="panel">
    <p class="muted">Connect an inbox to scan recent emails for resume attachments (PDF / DOCX) and score them with AI. You can connect either or both.</p>

    <div class="connect-grid">
      <div class="connect-row" data-provider="outlook">
        <div class="connect-info">
          <div class="connect-name">Outlook</div>
          <div class="connect-status muted small" id="outlookStatus">Not connected</div>
        </div>
        <button id="connectOutlookBtn" class="secondary">Connect</button>
      </div>
      <div class="connect-row" data-provider="gmail">
        <div class="connect-info">
          <div class="connect-name">Gmail</div>
          <div class="connect-status muted small" id="gmailStatus">Not connected</div>
        </div>
        <button id="connectGmailBtn" class="secondary">Connect</button>
      </div>
    </div>

    <button id="continueBtn" class="primary hidden">Continue</button>
    <p id="authError" class="error hidden"></p>
  </section>

  <section id="mainPanel" class="panel hidden">
    <div class="tabs">
      <button class="tab active" data-tab="inbox">Inbox</button>
      <button class="tab" data-tab="rankings">Rankings</button>
    </div>

    <div id="tab-inbox" class="tab-pane">
      <div class="row">
        <button id="refreshBtn" class="secondary">Refresh inbox</button>
        <label id="autoScoreToggle" class="toggle" title="When ON, the extension polls your inbox every 60s and auto-scores new resumes (burns LLM tokens). Turn OFF to score only the resumes you click on.">
          <input type="checkbox" id="autoScoreCheck" />
          <span class="toggle-slider"></span>
          <span class="toggle-label">Auto-score</span>
        </label>
        <span id="statusLine" class="muted small"></span>
      </div>

      <div id="resumeList" class="list" aria-live="polite">
        <!-- resume cards injected here -->
      </div>
    </div>

    <div id="tab-rankings" class="tab-pane hidden">
      <div class="row">
        <button id="refreshRankingsBtn" class="secondary">Refresh rankings</button>
        <button id="downloadXlsxBtn" class="secondary" title="Download all scored candidates as an Excel sheet">Download Excel</button>
        <span id="rankingsStatus" class="muted small"></span>
      </div>
      <div id="rankingsList" class="rankings" aria-live="polite">
        <!-- category groups injected here -->
      </div>
    </div>

    <div id="resultPanel" class="result hidden">
      <h3 id="resultTitle">Score</h3>

      <div class="score-row">
        <div class="score-circle" id="scoreCircle">
          <span id="scoreNumber">--</span>
        </div>
        <div class="score-meta">
          <div id="scoreFilename" class="filename"></div>
          <div id="scoreFrom" class="muted small"></div>
          <div class="result-tags">
            <span id="scoreCategory" class="badge badge-cat hidden"></span>
            <span id="scoreRoleTitle" class="muted small"></span>
          </div>
        </div>
      </div>

      <div class="breakdown" id="breakdown"></div>

      <h4>Summary</h4>
      <p id="summary" class="summary"></p>

      <div class="cols">
        <div>
          <h4>Strengths</h4>
          <ul id="strengths"></ul>
        </div>
        <div>
          <h4>Concerns</h4>
          <ul id="concerns"></ul>
        </div>
      </div>

      <h4>Recommendations</h4>
      <ul id="recommendations"></ul>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span id="loadingText">Working…</span>
    </div>

    <p id="mainError" class="error hidden"></p>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
